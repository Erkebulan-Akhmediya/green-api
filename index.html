<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Тестовое задание</title>
    <style>
        body {
            display: flex;
            flex-direction: row;
            justify-content: center;
        }
        .half {
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .big-margin-top {
            margin-top: 30px;
        }

        .small-margin-top {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="half" style="width: 20%">
        <label for="idInstance">idInstance</label>
        <input id="idInstance" type="text">
        <label for="apiTokenInstance">apiTokenInstance</label>
        <input id="apiTokenInstance" type="text">

        <button class="big-margin-top" id="getSettings">getSettings</button>
        <button class="small-margin-top" id="getStateInstance">getStateInstance</button>

        <label for="msgPhone" class="big-margin-top">Телефон</label>
        <input id="msgPhone" type="text">

        <label for="msg">Сообщение</label>
        <textarea id="msg" rows="3"></textarea>

        <button class="small-margin-top" id="sendMessage">sendMessage</button>

        <label for="filePhone" class="big-margin-top">Телефон</label>
        <input id="filePhone" type="text">

        <label for="fileUrl">Ссылка на файл</label>
        <input id="fileUrl" type="text">

        <button class="small-margin-top" id="sendFileByUrl">sendFileByUrl</button>

    </div>
    <div class="half" style="width: 40%">
        <label for="response">Ответ</label>
        <textarea id="response" rows="30" readonly></textarea>
    </div>
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/@green-api/whatsapp-api-client/lib/whatsapp-api-client.min.js"></script>
    <script>
        let instance;

        function getInstance() {
            if (!instance) {
                const idInstance = document.getElementById('idInstance').value
                const apiTokenInstance = document.getElementById('apiTokenInstance').value
                instance = whatsAppClient.restAPI({
                    idInstance,
                    apiTokenInstance,
                })
            }
            return instance;
        }

        function displayResponse(promise) {
            const response = document.getElementById('response')
            promise
                .then(data => response.value = JSON.stringify(data))
                .catch(err => response.value = err)
        }

        function getSettings() {
            const res = getInstance().settings.getSettings()
            displayResponse(res)
        }

        function getStateInstance() {
            const res = getInstance().instance.getStateInstance()
            displayResponse(res)
        }

        function sendMessage() {
            const phone = document.getElementById('msgPhone').value + '@c.us'
            const msg = document.getElementById('msg').value
            const res = getInstance().message.sendMessage(phone, null, msg)
            displayResponse(res)
        }

        function sendFileByUrl() {
            const phone = document.getElementById('filePhone').value + '@c.us'
            const url = document.getElementById('fileUrl').value
            const res = getInstance().file.sendFileByUrl(phone, null, url, 'file')
            displayResponse(res)
        }

        document.getElementById('getSettings').addEventListener('click', getSettings)
        document.getElementById('getStateInstance').addEventListener('click', getStateInstance)
        document.getElementById('sendMessage').addEventListener('click', sendMessage)
        document.getElementById('sendFileByUrl').addEventListener('click', sendFileByUrl)
    </script>
</body>
</html>
